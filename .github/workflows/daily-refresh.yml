name: Daily Stock Refresh

on:
  schedule:
    # UTC 21:00 = US market close (4PM ET) + 1 hour buffer
    # = Taiwan time 05:00 AM next day
    - cron: '0 21 * * 1-5'  # Mon-Fri only
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch quotes and push cache
        env:
          GITHUB_TOKEN: ${{ secrets.CACHE_TOKEN }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/refresh_quotes.py
